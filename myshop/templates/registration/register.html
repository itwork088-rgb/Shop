{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'home.css' %}">
    <title>Регистрация</title>
</head>
<body>

<header>
    <h1>📝 Регистрация</h1>
    <p><a href="{% url 'products:list' %}" style="color:white;">← Вернуться в каталог</a></p>
</header>

<div class="cart-container" style="max-width:450px;">
    <form method="post" class="auth-form">
        {% csrf_token %}

        <div class="form-group">
            <label for="id_username">Имя пользователя</label>
            <input type="text" name="username" id="id_username" required placeholder="username">
        </div>

        <div class="form-group">
            <label for="id_email">Email</label>
            <input type="email" name="email" id="id_email" required placeholder="email@example.com">
        </div>

        <div class="form-group">
            <label for="id_password1">Пароль</label>
            <input type="password" name="password1" id="id_password1" required placeholder="••••••••">
        </div>

        <div class="form-group">
            <label for="id_password2">Подтверждение пароля</label>
            <input type="password" name="password2" id="id_password2" required placeholder="••••••••">
        </div>

        {% if form.errors %}
        <div style="color:#ef4444;margin-bottom:15px;font-size:14px;">
            {% for field, errors in form.errors.items %}
                {% for error in errors %}
                    <p>{{ error }}</p>
                {% endfor %}
            {% endfor %}
        </div>
        {% endif %}

        <button type="submit" class="buy-btn" style="width:100%;">Зарегистрироваться</button>
    </form>

    <p style="text-align:center;margin-top:20px;color:#666;">
        Уже есть аккаунт? <a href="{% url 'products:login' %}" style="color:#4f46e5;">Войти</a>
    </p>
</div>

</body>
</html>
